<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>MARKLEFYNE ELITE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .gold { color: #d4af37; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; border-radius: 12px; overflow: hidden; }
        .card:hover { border-color: #d4af37; transform: translateY(-5px); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2); }
        
        #s { background: #ffffff; color: #000000; font-weight: 700; border: none; }
        #s::placeholder { color: #666; font-weight: 400; }

        .nav-btn { background: #111; border: 1px solid #222; padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: bold; color: #888; transition: 0.3s; white-space: nowrap; outline: none; }
        .nav-btn.active { border-color: #d4af37; color: #fff; background: #1a1a1a; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,1); z-index:100; flex-direction: column; }
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 1px solid #1a1a1a; }
        
        iframe { width: 100%; flex-grow: 1; border: none; background: #000; }
        
        .fix-btn { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 5px 15px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-right: 15px; transition: 0.2s; }
        .fix-btn:hover { background: #d4af37; color: #000; }
        .srv-indicator { font-size: 9px; color: #555; margin-right: 10px; text-transform: uppercase; }
    </style>
</head>
<body class="p-5 md:p-12">

    <header class="flex flex-col items-center mb-10">
        <h1 class="text-6xl font-black italic gold tracking-tighter uppercase mb-6 text-center">MARKLEFYNE</h1>
        <input type="text" id="s" placeholder="Search movies or series..." class="p-5 rounded-2xl w-full md:w-1/2 text-center outline-none shadow-2xl focus:ring-4 focus:ring-yellow-600/20">
    </header>

    <div id="cats" class="flex flex-wrap justify-center gap-3 mb-12 overflow-x-auto pb-4 px-2">
        <button class="nav-btn active" onclick="setMode('new')">New Uploads</button>
        <button class="nav-btn" onclick="setMode('genre', 80)">Crime</button>
        <button class="nav-btn" onclick="setMode('search', 'Dark Web')">Dark Web</button>
        <button class="nav-btn" onclick="setMode('search', 'Cyber')">Cyber</button>
        <button class="nav-btn" onclick="setMode('search', 'Hacking')">Hacking</button>
        <button class="nav-btn" onclick="setMode('genre', 99)">Documentary</button>
        <button class="nav-btn" onclick="setMode('all')">All</button>
    </div>

    <div id="g" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8"></div>
    <div id="loader" class="py-20 text-center gold italic animate-pulse tracking-widest text-sm uppercase">Global Search Active...</div>

    <div id="overlay">
        <div class="top-bar">
            <h2 id="m-title" class="text-xl font-bold gold truncate italic uppercase tracking-tighter"></h2>
            <div class="flex items-center">
                <span id="srv-name" class="srv-indicator">Server 1</span>
                <button id="retry-btn" class="fix-btn" onclick="toggleSource()">Switch Source</button>
                <button onclick="closePlayer()" class="bg-white text-black font-black px-8 py-2 rounded-full text-xs hover:bg-gold transition shadow-lg">CLOSE X</button>
            </div>
        </div>
        <iframe id="f" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        const token = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0MzAxNTFmYjFhNTU0MzhjNGMyYmNiZGFhNjhmNWNjNiIsIm5iZiI6MTc3NTAzNTgwNC41MDIsInN1YiI6IjY5Y2NlNTljOWQ3ZDdlYWU3ZTI3ZjFmMiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.0ETYAYtuKYrs5Ho3sHw95P_GzDSvxkgQYDnuQSC3DE0';
        let currentPage = 1, currentMode = 'new', currentVal = '', isLoading = false;
        let lastId = '', lastType = '', currentSrv = 1;

        async function fetchData(isNew = true) {
            if (isLoading) return; isLoading = true;
            if (isNew) { currentPage = 1; document.getElementById('g').innerHTML = ''; }
            const base = "https://api.themoviedb.org/3";
            let url = currentMode === 'new' ? `${base}/discover/movie?sort_by=primary_release_date.desc&page=${currentPage}&language=en-US&release_date.lte=2026-04-01&vote_count.gte=5` :
                      currentMode === 'all' ? `${base}/trending/all/day?page=${currentPage}&language=en-US` :
                      currentMode === 'genre' ? `${base}/discover/movie?with_genres=${currentVal}&page=${currentPage}&language=en-US&sort_by=popularity.desc` :
                      `${base}/search/multi?query=${encodeURIComponent(currentVal)}&page=${currentPage}&language=en-US`;
            try {
                const r = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const d = await r.json();
                if (d.results) render(d.results);
                currentPage++;
            } catch (e) {}
            isLoading = false;
        }

        function render(results) {
            document.getElementById('g').innerHTML += results.filter(i => i.poster_path).map(i => `
                <div class="card p-1" onclick="openPlayer('${i.media_type||'movie'}','${i.id}','${(i.title||i.name).replace(/'/g, "\\'")}')">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full rounded-lg">
                    <div class="p-3"><p class="text-[11px] font-bold gold truncate uppercase tracking-tighter">${i.title || i.name}</p></div>
                </div>
            `).join('');
        }

        function openPlayer(t, id, title) {
            lastId = id; lastType = (t === 'tv' ? 'tv' : 'movie');
            currentSrv = 1;
            document.getElementById('m-title').innerText = title;
            loadSource();
            document.getElementById('overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function loadSource() {
            const frame = document.getElementById('f');
            document.getElementById('srv-name').innerText = `Server ${currentSrv}`;
            if (currentSrv === 1) {
                frame.src = `https://vidsrc.me/embed/${lastType}?tmdb=${lastId}`;
            } else if (currentSrv === 2) {
                frame.src = `https://vidsrc.pro/embed/${lastType}/${lastId}`;
            } else {
                frame.src = `https://vidsrc.icu/embed/${lastType}/${lastId}`;
            }
        }

        function toggleSource() {
            currentSrv = (currentSrv % 3) + 1;
            loadSource();
        }

        function closePlayer() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('f').src = '';
            document.body.style.overflow = 'auto';
        }

        function setMode(m, v='') {
            currentMode = m; currentVal = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
            fetchData(true);
        }

        window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) fetchData(false); };
        document.getElementById('s').onkeypress = (e) => { if(e.key === 'Enter') { currentMode = 'search'; currentVal = e.target.value; fetchData(true); } };
        fetchData();
    </script>
</body>
</html>
