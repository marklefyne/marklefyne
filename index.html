<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MARKLEFYNE ELITE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #020202; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .gold { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; transition: 0.5s; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { border-color: #d4af37; transform: scale(1.05); z-index: 10; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        #player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; backdrop-filter: blur(10px); }
        iframe { border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .search-bar { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); transition: 0.3s; }
        .search-bar:focus { background: rgba(255,255,255,0.1); border-color: #d4af37; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <h1 class="text-5xl font-black italic gold tracking-tighter uppercase">MARKLEFYNE</h1>
        <div class="relative w-full md:w-1/2">
            <input type="text" id="s" placeholder="חפש סרט, סדרה או דוקו..." 
                   class="search-bar w-full p-5 rounded-2xl border border-zinc-800 text-white text-center outline-none">
        </div>
    </div>

    <div id="g" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-6"></div>

    <div id="player-overlay" class="flex flex-col items-center justify-center p-4">
        <button onclick="closePlayer()" class="mb-5 gold border border-gold px-8 py-2 rounded-full font-bold hover:bg-gold hover:text-black transition">סגור X</button>
        <iframe id="f" width="95%" height="80%" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        const token = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0MzAxNTFmYjFhNTU0MzhjNGMyYmNiZGFhNjhmNWNjNiIsIm5iZiI6MTc3NTAzNTgwNC41MDIsInN1YiI6IjY5Y2NlNTljOWQ3ZDdlYWU3ZTI3ZjFmMiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.0ETYAYtuKYrs5Ho3sHw95P_GzDSvxkgQYDnuQSC3DE0';

        async function load(q = '') {
            const url = q ? 
                `https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(q)}&language=he-IL` : 
                `https://api.themoviedb.org/3/trending/all/day?language=he-IL`;

            const r = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            const d = await r.json();
            document.getElementById('g').innerHTML = d.results.filter(i=>i.poster_path).map(i => `
                <div class="card p-1" onclick="openPlayer('${i.media_type||'movie'}','${i.id}')">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="rounded-lg w-full">
                    <div class="p-3">
                        <p class="text-[11px] font-bold gold truncate">${i.title || i.name}</p>
                        <p class="text-[9px] text-zinc-500 uppercase">${i.release_date ? i.release_date.split('-')[0] : (i.first_air_date ? i.first_air_date.split('-')[0] : '')}</p>
                    </div>
                </div>
            `).join('');
        }

        function openPlayer(type, id) {
            const embedType = type === 'tv' ? 'tv' : 'movie';
            document.getElementById('f').src = `https://vidsrc.me/embed/${embedType}?tmdb=${id}`;
            document.getElementById('player-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('f').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('s').onkeypress = (e) => { if(e.key === 'Enter') load(e.target.value); };
        load();
    </script>
</body>
</html>
