<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>MARKLEFYNE ELITE v3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .gold { color: #d4af37; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.4s; cursor: pointer; border-radius: 12px; overflow: hidden; position: relative; }
        .card:hover { border-color: #d4af37; transform: translateY(-8px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); }
        .nav-btn { background: #111; border: 1px solid #222; padding: 10px 22px; border-radius: 50px; transition: 0.3s; font-size: 13px; font-weight: bold; color: #888; white-space: nowrap; outline: none; }
        .nav-btn:hover, .nav-btn.active { border-color: #d4af37; color: #fff; background: #1a1a1a; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:100; backdrop-filter: blur(20px); flex-direction: column; align-items: center; justify-content: center; }
        iframe { border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); background: #000; }
        .loading-trigger { height: 100px; width: 100%; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; }
    </style>
</head>
<body class="p-5 md:p-12">

    <header class="flex flex-col items-center mb-10">
        <h1 class="text-6xl font-black italic gold tracking-tighter uppercase mb-6 text-center">MARKLEFYNE</h1>
        <input type="text" id="s" placeholder="Search for anything..." 
               class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl w-full md:w-1/2 text-white text-center outline-none focus:border-gold transition text-lg shadow-2xl">
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-12 overflow-x-auto pb-4">
        <button class="nav-btn active" onclick="setMode('all')">All Trending</button>
        <button class="nav-btn" onclick="setMode('genre', 80)">Crime</button>
        <button class="nav-btn" onclick="setMode('genre', 99)">Documentary</button>
        <button class="nav-btn" onclick="setMode('genre', 9648)">Mystery</button>
        <button class="nav-btn" onclick="setMode('search', 'Dark Web')">Dark Web</button>
        <button class="nav-btn" onclick="setMode('search', 'Cyber')">Cyber</button>
    </div>

    <div id="g" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 text-left"></div>
    
    <div id="loader" class="loading-trigger">Scanning for more content...</div>

    <div id="overlay">
        <div class="w-full max-w-6xl flex justify-between items-center mb-4 px-4">
            <h2 id="m-title" class="text-2xl font-bold gold truncate mr-4 uppercase italic"></h2>
            <button onclick="closePlayer()" class="bg-white text-black font-bold px-8 py-2 rounded-full hover:bg-gold transition shadow-lg">CLOSE X</button>
        </div>
        <iframe id="f" width="90%" height="75%" src="" frameborder="0" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
    </div>

    <script>
        const token = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0MzAxNTFmYjFhNTU0MzhjNGMyYmNiZGFhNjhmNWNjNiIsIm5iZiI6MTc3NTAzNTgwNC41MDIsInN1YiI6IjY5Y2NlNTljOWQ3ZDdlYWU3ZTI3ZjFmMiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.0ETYAYtuKYrs5Ho3sHw95P_GzDSvxkgQYDnuQSC3DE0';
        
        let currentPage = 1;
        let currentMode = 'all'; // all, genre, search
        let currentVal = '';
        let isLoading = false;

        async function fetchData(isNew = true) {
            if (isLoading) return;
            isLoading = true;
            if (isNew) {
                currentPage = 1;
                document.getElementById('g').innerHTML = '';
            }

            let url = '';
            if (currentMode === 'all') url = `https://api.themoviedb.org/3/trending/all/day?language=en-US&page=${currentPage}`;
            else if (currentMode === 'genre') url = `https://api.themoviedb.org/3/discover/movie?with_genres=${currentVal}&sort_by=popularity.desc&language=en-US&page=${currentPage}`;
            else if (currentMode === 'search') url = `https://api.themoviedb.org/3/search/multi?query=${encodeURIComponent(currentVal)}&language=en-US&page=${currentPage}`;

            try {
                const r = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const d = await r.json();
                render(d.results);
                currentPage++;
            } catch (e) { console.error(e); }
            isLoading = false;
        }

        function render(results) {
            const container = document.getElementById('g');
            const html = results.filter(i => i.poster_path).map(i => `
                <div class="card p-1" onclick="openPlayer('${i.media_type||'movie'}','${i.id}','${(i.title||i.name).replace(/'/g, "\\'")}')">
                    <img src="https://image.tmdb.org/t/p/w500${i.poster_path}" class="w-full rounded-lg">
                    <div class="p-3">
                        <p class="text-[11px] font-bold gold truncate uppercase tracking-tighter">${i.title || i.name}</p>
                        <p class="text-[9px] text-zinc-600 mt-1">${(i.release_date || i.first_air_date || '').split('-')[0]}</p>
                    </div>
                </div>
            `).join('');
            container.innerHTML += html;
        }

        function setMode(mode, val = '') {
            currentMode = mode;
            currentVal = val;
            fetchData(true);
            
            // UI Active State
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event?.target?.classList?.add('active');
        }

        function openPlayer(t, id, title) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('f').src = `https://vidsrc.me/embed/${t==='tv'?'tv':'movie'}?tmdb=${id}`;
            document.getElementById('overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('f').src = '';
            document.body.style.overflow = 'auto';
        }

        // Infinite Scroll Logic
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
                fetchData(false);
            }
        };

        document.getElementById('s').onkeypress = (e) => { 
            if(e.key === 'Enter') {
                currentMode = 'search';
                currentVal = e.target.value;
                fetchData(true);
            }
        };

        fetchData();
    </script>
</body>
</html>
